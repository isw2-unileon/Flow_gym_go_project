<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FlowGym</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="register-layout">

        <div class="register-info-side">
            <div class="register-info-content">
                <h1>Join FlowGym</h1>

                <p>
                    Create your account and optimize your gym experience
                    with real-time machine availability and smart exercise recommendations.
                </p>
            </div>
        </div>

        <div class="register-form-side">

            <div class="register-card">

                <div class="register-header">
                    <h2>Create account</h2>
                    <p>Start training smarter today.</p>
                </div>

                <form id="register-form">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <button type="submit">Create account</button>
                </form>

                <div id="register-result" class="auth-message"></div>

                <div class="register-links">

                    <p>
                        Already have an account?
                        <a href="/login">Login here</a>
                    </p>

                    <p>
                        <a href="/">Back to home</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById("register-form");
        const registerResult = document.getElementById("register-result");

        registerForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            try {
                const response = await fetch("/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password
                    })
                });

                if (!response.ok) {
                    registerResult.textContent = "Could not create account.";
                    return;
                }

                window.location.href = "/login";

            } catch (error) {
                registerResult.textContent = "Unexpected error during registration.";
            }
        });
    </script>

</body>

</html>
