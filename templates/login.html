<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FlowGym</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="login-layout">

        <div class="login-image-side">
            <div class="login-overlay">
                <h1>FlowGym</h1>
                <p>
                    Train smarter. Avoid crowded machines.
                    Keep your workout flowing.
                </p>
            </div>
        </div>

        <div class="login-form-side">
            <div class="login-card-modern">

                <div class="login-header">
                    <h2>Welcome Back</h2>
                    <p>Login to continue your training session.</p>
                </div>

                <form id="login-form">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <button type="submit">Login</button>
                </form>

                <div id="login-result" class="auth-message"></div>

                <div class="login-links">
                    <p>
                        Don't have an account?
                        <a href="/register">Create account</a>
                    </p>

                    <p>
                        <a href="/">Back to home</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("login-form");
        const loginResult = document.getElementById("login-result");

        loginForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                if (!response.ok) {
                    loginResult.textContent = "Invalid email or password.";
                    return;
                }

                window.location.href = "/app";

            } catch (error) {
                loginResult.textContent = "Unexpected error during login.";
            }
        });
    </script>
</body>

</html>
