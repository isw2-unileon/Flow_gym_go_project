<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowGym</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="landing-wrapper">

        <section class="landing-hero">

            <div class="landing-content">

                <span class="landing-badge">
                    Smart Gym Experience
                </span>

                <h1>
                    Train Smarter With FlowGym
                </h1>

                <p class="landing-description">
                    Avoid crowded machines, discover alternative exercises,
                    and optimize your workout sessions with real-time gym insights.
                </p>

                <div class="landing-actions">

                    <a href="/login" class="landing-button">
                        Login
                    </a>

                    <a href="/register" class="landing-button secondary">
                        Create Account
                    </a>

                </div>

            </div>

            <div class="landing-preview">

                <div class="preview-card">
                    <span class="preview-status available"></span>
                    <h3>Bench Press</h3>
                    <p>Alternative available now</p>
                </div>

                <div class="preview-card">
                    <span class="preview-status occupied"></span>
                    <h3>Lat Pulldown</h3>
                    <p>Machine currently occupied</p>
                </div>

                <div class="preview-card">
                    <span class="preview-status available"></span>
                    <h3>Dumbbells</h3>
                    <p>Ready to use</p>
                </div>

            </div>

        </section>

    </div>

</body>

</html>
